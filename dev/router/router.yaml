supergraph:
  listen: 0.0.0.0:4000

cors:
  origins:
    - http://localhost:3000
  allow_credentials: true
  allow_headers:
    - content-type

# Override subgraph URLs for local dev (Docker → host networking).
# In Docker, host.docker.internal resolves to the host machine.
override_subgraph_url:
  afl: http://host.docker.internal:8080/query
  ffl: http://host.docker.internal:8081/query
