services:
  postgres:
    image: postgres:16-alpine
    container_name: xffl-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: xffl
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  typesense:
    image: typesense/typesense:27.1
    container_name: xffl-typesense
    command: ["--data-dir=/data", "--api-key=${TYPESENSE_API_KEY:-xyz}"]
    ports:
      - "${TYPESENSE_PORT:-8108}:8108"
    volumes:
      - typesensedata:/data

volumes:
  pgdata:
  typesensedata:
