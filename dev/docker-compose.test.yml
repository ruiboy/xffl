services:
  postgres-test:
    image: postgres:16-alpine
    container_name: xffl-postgres-test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: xffl
    ports:
      - "5433:5432"
    volumes:
      - ./postgres/test-e2e:/docker-entrypoint-initdb.d
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  router-test:
    image: ghcr.io/apollographql/router:v1.57.0
    container_name: xffl-router-test
    command:
      - --supergraph=/config/supergraph.graphql
      - --config=/config/router.test.yaml
    volumes:
      - ./router:/config
    ports:
      - "4001:4000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
