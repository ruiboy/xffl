services:
  postgres-test:
    image: postgres:16-alpine
    container_name: xffl-postgres-test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: xffl
    ports:
      - "5433:5432"
    volumes:
      - ./postgres/test-init:/docker-entrypoint-initdb.d
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
