schema:
  - api/graphql/*.graphqls

exec:
  filename: internal/interface/graphql/generated.go
  package: graphql

model:
  filename: internal/interface/graphql/models_gen.go
  package: graphql

resolver:
  layout: follow-schema
  dir: internal/interface/graphql
  package: graphql
  filename_template: "{name}.resolvers.go"

federation:
  filename: internal/interface/graphql/federation.go
  package: graphql
  version: 2

autobind: []

models:
  ID:
    model:
      - github.com/99designs/gqlgen/graphql.ID

  FFLSeason:
    fields:
      ladder: { resolver: true }
      rounds: { resolver: true }

  FFLRound:
    fields:
      season: { resolver: true }
      matches: { resolver: true }

  FFLMatch:
    fields:
      homeClubMatch: { resolver: true }
      awayClubMatch: { resolver: true }

  FFLClubSeason:
    fields:
      players: { resolver: true }

  FFLClubMatch:
    fields:
      playerMatches: { resolver: true }

  FFLPlayerSeason:
    fields:
      aflPlayerSeason: { resolver: true }

  FFLPlayerMatch:
    fields:
      aflPlayerMatchId: { resolver: true }
      aflPlayerMatch: { resolver: true }
