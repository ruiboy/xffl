schema:
  - api/graphql/*.graphqls

exec:
  filename: internal/interface/graphql/generated.go
  package: graphql

model:
  filename: internal/interface/graphql/models_gen.go
  package: graphql

resolver:
  layout: follow-schema
  dir: internal/interface/graphql
  package: graphql
  filename_template: "{name}.resolvers.go"

federation:
  filename: internal/interface/graphql/federation.go
  package: graphql
  version: 2

autobind: []

models:
  ID:
    model:
      - github.com/99designs/gqlgen/graphql.ID
  AFLSeason:
    fields:
      ladder:
        resolver: true
      rounds:
        resolver: true
      playerSeasons:
        resolver: true
  AFLRound:
    fields:
      season:
        resolver: true
      matches:
        resolver: true
  AFLMatch:
    fields:
      round:
        resolver: true
      homeClubMatch:
        resolver: true
      awayClubMatch:
        resolver: true
  AFLClubMatch:
    fields:
      playerMatches:
        resolver: true
      match:
        resolver: true
  AFLPlayerMatch:
    fields:
      clubMatch:
        resolver: true
  AFLPlayerSeason:
    fields:
      player:
        resolver: true
      clubSeason:
        resolver: true
      matches:
        resolver: true
