schema:
  - api/graphql/*.graphqls

exec:
  filename: internal/interface/graphql/generated.go
  package: graphql

model:
  filename: internal/interface/graphql/models_gen.go
  package: graphql

resolver:
  layout: follow-schema
  dir: internal/interface/graphql
  package: graphql
  filename_template: "{name}.resolvers.go"

autobind: []

models:
  ID:
    model:
      - github.com/99designs/gqlgen/graphql.ID
  AFLClub:
    fields:
      players:
        resolver: true
  AFLSeason:
    fields:
      ladder:
        resolver: true
      rounds:
        resolver: true
  AFLRound:
    fields:
      season:
        resolver: true
      matches:
        resolver: true
  AFLMatch:
    fields:
      homeClubMatch:
        resolver: true
      awayClubMatch:
        resolver: true
  AFLClubMatch:
    fields:
      playerMatches:
        resolver: true
