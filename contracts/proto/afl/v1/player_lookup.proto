syntax = "proto3";

package afl.v1;

option go_package = "xffl/contracts/gen/afl/v1;aflv1";

service PlayerLookup {
  rpc LookupPlayers(LookupPlayersRequest) returns (LookupPlayersResponse);
  rpc LookupPlayerSeason(LookupPlayerSeasonRequest) returns (LookupPlayerSeasonResponse);
  rpc LookupPlayerMatch(LookupPlayerMatchRequest) returns (LookupPlayerMatchResponse);
}

message LookupPlayersRequest {
  repeated int32 afl_player_ids = 1;
}

message LookupPlayersResponse {
  repeated PlayerInfo players = 1;
}

message PlayerInfo {
  int32 id         = 1;
  string name      = 2;
  string club_name = 3;
}

message LookupPlayerSeasonRequest {
  int32 player_season_id = 1;
}

message LookupPlayerSeasonResponse {
  int32 player_id = 1;
}

message LookupPlayerMatchRequest {
  oneof key {
    LookupByIDs          by_ids          = 1;
    LookupBySeasonRound  by_season_round = 2;
  }
}

message LookupByIDs {
  repeated int32 ids = 1;
}

message LookupBySeasonRound {
  repeated int32 player_season_ids = 1;
  int32          round_id          = 2;
}

message LookupPlayerMatchResponse {
  repeated PlayerMatchStats stats = 1;
}

message PlayerMatchStats {
  int32  id               = 1;
  string status           = 2;
  int32  goals            = 3;
  int32  kicks            = 4;
  int32  handballs        = 5;
  int32  marks            = 6;
  int32  tackles          = 7;
  int32  hitouts          = 8;
  int32  player_season_id = 9;
}
